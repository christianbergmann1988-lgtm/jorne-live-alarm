name: TikTok Live Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jorne-live-check
  cancel-in-progress: false

jobs:
  check-live:
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Node.js installieren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Bot starten
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node index.js

      - name: Live-Status dauerhaft speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json

          if git diff --cached --quiet; then
            echo "Der gespeicherte Status hat sich nicht verändert."
          else
            git commit -m "Live-Status aktualisieren"
            git push
          fi
